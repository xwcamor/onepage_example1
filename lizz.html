<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LizLisa - Tienda Oficial</title>
    <style>
        :root {
            --pink-soft: #fdf0f5;
            --pink-accent: #eebccb;
            --gold-text: #b19669;
            --white: #ffffff;
            --text-gray: #666;
        }

        body { font-family: 'Georgia', serif; margin: 0; background-color: var(--white); color: var(--text-gray); }
        .top-bar { background-color: #f8c8d8; height: 25px; width: 100%; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #eee; cursor: pointer; position: relative; }
        
        .menu-toggle {
            display: none;
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--gold-text);
        }

        .container { display: flex; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* Sidebar */
        aside { width: 220px; text-align: left; flex-shrink: 0; transition: 0.3s; }
        .sidebar-header-mobile { display: none; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-menu { font-size: 28px; cursor: pointer; color: var(--gold-text); font-weight: bold; }

        .sidebar-title { color: var(--gold-text); font-size: 18px; border-bottom: 1px solid var(--gold-text); margin-bottom: 15px; padding-bottom: 5px; text-transform: uppercase; }
        
        .search-btn { 
            background: var(--gold-text); color: white; border: none; width: 100%; padding: 8px; 
            cursor: pointer; text-transform: uppercase; font-size: 11px; margin-top: 5px;
        }

        .category-item { font-size: 14px; color: #999; line-height: 2.5; cursor: pointer; transition: 0.3s; }
        .category-item:hover, .color-dot:hover { color: var(--pink-accent); }
        .category-item.active { color: var(--gold-text); font-weight: bold; }

        .color-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer; position: relative; }
        .color-dot.active::after { content: '✓'; color: white; position: absolute; left: 6px; top: 2px; font-size: 14px; }

        main { flex: 1; padding-left: 40px; }
        .main-title { font-family: 'Cursive', serif; font-size: clamp(24px, 5vw, 40px); color: var(--text-gray); text-align: center; margin-bottom: 10px; }
        .sub-title { text-align: center; font-size: 14px; color: var(--gold-text); margin-bottom: 30px; text-transform: uppercase; }
        
        .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .product-card { text-align: center; background: #fff; padding-bottom: 15px; border-radius: 8px; animation: fadeIn 0.5s ease; }
        .product-card img { width: 100%; border: 1px solid #eee; border-radius: 5px; aspect-ratio: 3/4; object-fit: cover; }
        
        .add-btn { background: var(--pink-accent); border: none; color: white; padding: 10px 15px; margin-top: 8px; cursor: pointer; font-size: 11px; text-transform: uppercase; border-radius: 20px; }

        #cart-launcher { position: fixed; bottom: 30px; right: 30px; background: var(--pink-accent); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; }
        #cart-count { position: absolute; top: 5px; right: 5px; background: var(--gold-text); color: white; font-size: 12px; padding: 2px 7px; border-radius: 50%; }
        
        #cart-window { position: fixed; bottom: 100px; right: 30px; width: min(380px, 95vw); background: white; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); border: 2px solid var(--pink-soft); display: none; flex-direction: column; z-index: 1001; overflow: hidden; }
        .cart-header { background: var(--pink-soft); padding: 20px; font-weight: bold; color: var(--gold-text); display: flex; justify-content: space-between; align-items: center; }
        .cart-body { max-height: 350px; overflow-y: auto; padding: 15px; }
        
        .cart-item { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dotted #eee; font-size: 13px; }
        .qty-controls { display: flex; align-items: center; gap: 5px; margin: 0 10px; }
        .qty-btn { background: #eee; border: none; width: 22px; height: 22px; cursor: pointer; border-radius: 50%; font-weight: bold; }
        .remove-item-btn { background: #fde2e2; color: #ff4d4d; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 16px; }

        .cart-footer { padding: 20px; border-top: 1px solid #eee; text-align: center; }
        .empty-cart-btn { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; margin-top: 10px; width: 100%; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar-header-mobile { display: flex; } /* Muestra la X y el título en el menú */
            aside {
                position: fixed; left: -100%; top: 0; height: 100%; background: white; z-index: 2000;
                padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); width: 280px;
            }
            aside.open { left: 0; }
            main { padding-left: 0; }
            /* CAMBIO CLAVE: Un producto por fila en celular */
            .product-grid { grid-template-columns: 1fr; gap: 25px; padding: 0 10px; }
            .product-card img { height: auto; }
            .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1999; }
            .overlay.active { display: block; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="top-bar"></div>

<header>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <div onclick="showAll()">
        <div style="font-size: 32px; color: var(--gold-text); letter-spacing: 2px;">LIZ LISA</div>
        <div style="font-size: 10px; color: #999;">TIENDA DE ROPA VIRTUAL</div>
    </div>
</header>

<div class="container">
    <aside id="sidebar">
        <div class="sidebar-header-mobile">
            <span class="sidebar-title" style="border:none; margin:0;">Menú</span>
            <span class="close-menu" onclick="toggleMenu()">×</span>
        </div>

        <div class="sidebar-title">Búsqueda</div>
        <input type="text" id="search-input" placeholder="Escribe..." style="width: 100%; padding: 10px; border: 1px solid #ddd; outline: none; box-sizing: border-box; border-radius: 5px;">
        <button class="search-btn" onclick="handleSearch()">BUSCAR</button>
        
        <div class="sidebar-title" style="margin-top: 30px;">Color</div>
        <div class="color-filters">
            <div class="color-dot" style="background: pink;" onclick="filterByColor('rosa', this)" title="Rosa"></div>
            <div class="color-dot" style="background: black;" onclick="filterByColor('negro', this)" title="Negro"></div>
            <div class="color-dot" style="background: #add8e6;" onclick="filterByColor('celeste', this)" title="Celeste"></div>
            <div class="color-dot" style="background: #fff;" onclick="filterByColor('blanca', this)" title="Blanco"></div>
        </div>

        <div class="sidebar-title">Categorías</div>
        <div id="category-list">
            <div class="category-item" onclick="changeCategory('Dress', this)">• Vestidos</div>
            <div class="category-item" onclick="changeCategory('Faldas', this)">• Faldas</div>
            <div class="category-item" onclick="changeCategory('Acc', this)">• Bolsos</div>
        </div>
    </aside>

    <main>
        <div class="main-title" id="section-title">Colección LizLisa</div>
        <div class="sub-title" id="search-status">Todos los productos</div>
        <div class="product-grid" id="product-grid"></div>
    </main>
</div>

<div id="cart-launcher" onclick="toggleCart()">
    <span style="font-size: 24px;">👜</span>
    <span id="cart-count">0</span>
</div>

<div id="cart-window">
    <div class="cart-header">
        <span>MI SELECCIÓN</span>
        <span onclick="toggleCart()" style="cursor:pointer; font-size: 20px;">×</span>
    </div>
    <div class="cart-body" id="cart-items"></div>
    <div class="cart-footer">
        <div style="font-weight:bold; margin-bottom:10px; font-size: 18px;">Total: <span id="cart-total">S/ 0.00</span></div>
        <button style="background:var(--gold-text); color:white; border:none; padding:12px; width:100%; border-radius:30px; cursor:pointer; font-weight:bold;">IR A PAGAR</button>
        <button class="empty-cart-btn" onclick="clearCart()">VACIAR TODO EL CARRITO</button>
    </div>
</div>

<script>
    const inventory = [
        { id: 1, name: "Vestido Manga Larga rosa", price: 350, category: "Dress", color: "rosa", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2340_10.jpg" },
        { id: 2, name: "Vestido Rosa Lazos", price: 420, category: "Dress", color: "rosa", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2526_15.jpg" },
        { id: 3, name: "Vestido Negro Lazos", price: 290, category: "Dress", color: "negro", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2266_4.jpg" },
        { id: 4, name: "Vestido Capas sin hombros negro", price: 310, category: "Dress", color: "negro", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2459_2.jpg" },
        { id: 5, name: "Vestido Rosa Cuadros", price: 240, category: "Dress", color: "rosa", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2409_3.jpg" },
        { id: 6, name: "Falda negra en capas", price: 150, category: "Faldas", color: "negro", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2368_1.jpg" },
        { id: 7, name: "Falda rosa plisada", price: 150, category: "Faldas", color: "rosa", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2207_20.jpg" },
        { id: 8, name: "Falda celeste con lazo", price: 180, category: "Faldas", color: "celeste", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2368_15.jpg" },
        { id: 9, name: "Bolso lazo rosa", price: 45, category: "Acc", color: "rosa", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2115_2.jpg" },
        { id: 10, name: "Bolso lazo negro", price: 45, category: "Acc", color: "negro", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2353_4.jpg" },
        { id: 11, name: "Bolso elegante negro", price: 45, category: "Acc", color: "negro", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2478_10.jpg" },
        { id: 12, name: "Bolso Corazón rosa", price: 60, category: "Acc", color: "rosa", img: "https://contents.multilingualcart.com/ori/50934/goods_img/goods_2352_3.JPG" }
    ];

    let cart = [];
    let currentCategory = 'All';
    let currentColor = 'All';

    function displayProducts(list) {
        const grid = document.getElementById('product-grid');
        if (list.length === 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; padding: 50px;">No se encontraron productos.</p>`;
            return;
        }
        grid.innerHTML = list.map(p => `
            <div class="product-card">
                <img src="${p.img}" alt="${p.name}">
                <div class="product-info">
                    <div style="font-weight:bold; min-height: 32px;">${p.name}</div>
                    <div style="color: var(--gold-text); font-size: 16px; margin: 5px 0;">S/ ${p.price.toFixed(2)}</div>
                    <button class="add-btn" onclick="addToCart(${p.id})">Añadir al Carrito</button>
                </div>
            </div>
        `).join('');
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showAll() {
        currentCategory = 'All';
        currentColor = 'All';
        document.querySelectorAll('.category-item, .color-dot').forEach(el => el.classList.remove('active'));
        document.getElementById('section-title').innerText = "Colección LizLisa";
        handleSearch();
    }

    function changeCategory(cat, element) {
        currentCategory = cat;
        document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        if(window.innerWidth <= 768) toggleMenu();
        handleSearch();
    }

    function filterByColor(color, element) {
        if(currentColor === color) {
            currentColor = 'All';
            element.classList.remove('active');
        } else {
            currentColor = color;
            document.querySelectorAll('.color-dot').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }
        if(window.innerWidth <= 768) toggleMenu();
        handleSearch();
    }

    function handleSearch() {
        const term = document.getElementById('search-input').value.toLowerCase();
        let filtered = inventory;
        if (currentCategory !== 'All') filtered = filtered.filter(p => p.category === currentCategory);
        if (currentColor !== 'All') filtered = filtered.filter(p => p.color === currentColor);
        filtered = filtered.filter(p => p.name.toLowerCase().includes(term));
        displayProducts(filtered);
    }

    function addToCart(id) {
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.qty++;
        } else {
            const product = inventory.find(p => p.id === id);
            cart.push({ ...product, qty: 1 });
        }
        updateCartUI();
    }

    function updateQty(id, delta) {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) removeProduct(id);
            else updateCartUI();
        }
    }

    function removeProduct(id) {
        cart = cart.filter(i => i.id !== id);
        updateCartUI();
    }

    function clearCart() {
        if(confirm("¿Estás seguro de que quieres vaciar todo el carrito?")) {
            cart = [];
            updateCartUI();
        }
    }

    function updateCartUI() {
        const list = document.getElementById('cart-items');
        const count = document.getElementById('cart-count');
        const total = document.getElementById('cart-total');

        if (cart.length === 0) {
            list.innerHTML = `<p style="color:#ccc; text-align:center;">Tu carrito está vacío</p>`;
        } else {
            list.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div style="flex:1">
                        <div style="font-weight:bold">${item.name}</div>
                        <div style="color:var(--gold-text)">S/ ${(item.price * item.qty).toFixed(2)}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                    </div>
                    <button class="remove-item-btn" onclick="removeProduct(${item.id})">×</button>
                </div>
            `).join('');
        }

        const totalSum = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        count.innerText = cart.reduce((sum, item) => sum + item.qty, 0);
        total.innerText = `S/ ${totalSum.toFixed(2)}`;
    }

    function toggleCart() {
        const win = document.getElementById('cart-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    }

    document.getElementById('search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
    });

    showAll();
</script>

</body>
</html>
